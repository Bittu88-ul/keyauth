<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Server Status -->
    <div class="server-status">
        <div class="status-dot checking" id="statusDot"></div>
        <span class="status-text checking" id="statusText">Checking...</span>
    </div>

    <div class="auth-container">
        <div class="auth-card card-glass">
            <div class="logo">🔐 License Manager</div>
            <p class="subtitle">Sign in to your account</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
                <div id="loginMessage" style="margin-bottom: 12px; font-size: 14px;"></div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="/register.html">Register</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
