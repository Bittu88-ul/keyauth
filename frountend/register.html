<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Server Status -->
    <div class="server-status">
        <div class="status-dot checking" id="statusDot"></div>
        <span class="status-text checking" id="statusText">Checking...</span>
    </div>

    <div class="auth-container">
        <div class="auth-card card-glass">
            <div class="logo">🚀 License Manager</div>
            <p class="subtitle">Create your free account</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <div id="registerMessage" style="margin-bottom: 12px; font-size: 14px;"></div>
                <button type="submit" class="btn btn-success">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="/login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
